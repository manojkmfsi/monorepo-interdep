name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'README.md'
      - 'ARCHITECTURE.md'
      - '*.md'
      - '.github/workflows/docs.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build documentation
        run: |
          # Create docs directory if it doesn't exist
          mkdir -p docs
          
          # Copy markdown files to docs
          cp README.md docs/
          cp ARCHITECTURE.md docs/ 2>/dev/null || true
          cp QUICKSTART.md docs/ 2>/dev/null || true
          cp PROJECT_SUMMARY.txt docs/ 2>/dev/null || true
          
          # Create a simple index.html if not present
          if [ ! -f docs/index.html ]; then
            cat > docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Monorepo Documentation</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
                margin: 0;
                padding: 20px;
                background: #f5f5f5;
              }
              .container {
                max-width: 800px;
                margin: 0 auto;
                background: white;
                padding: 30px;
                border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.1);
              }
              h1 {
                color: #333;
                border-bottom: 3px solid #0969da;
                padding-bottom: 10px;
              }
              a {
                color: #0969da;
                text-decoration: none;
              }
              a:hover {
                text-decoration: underline;
              }
              .docs-links {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 15px;
                margin-top: 20px;
              }
              .doc-link {
                padding: 15px;
                border: 1px solid #ddd;
                border-radius: 6px;
                text-align: center;
                transition: all 0.3s;
              }
              .doc-link:hover {
                border-color: #0969da;
                background: #f0f7ff;
              }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>Monorepo Documentation</h1>
              <p>Welcome to the Monorepo with Interdependent Packages documentation.</p>
              
              <div class="docs-links">
                <a href="README.html" class="doc-link">📖 README</a>
                <a href="ARCHITECTURE.html" class="doc-link">🏗️ Architecture</a>
                <a href="QUICKSTART.html" class="doc-link">⚡ Quick Start</a>
              </div>
            </div>
          </body>
          </html>
          EOF
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          path: 'docs'

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
